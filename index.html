<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyondLibrary Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>.tab-panel.hidden { display: none; }</style>
</head>
<body class="h-full text-slate-800">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-full flex flex-col justify-center py-12 bg-slate-900">
        <div class="sm:mx-auto sm:w-full sm:max-w-md text-center text-white">
            <h2 class="text-3xl font-extrabold mb-8 serif-title">BeyondLibrary</h2>
        </div>
        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-slate-800 py-8 px-6 shadow-2xl rounded-2xl border border-slate-700">
                <form id="loginForm" class="space-y-4">
                    <input id="username" type="text" placeholder="Username" required class="block w-full p-2.5 bg-slate-700 rounded-lg text-white">
                    <input id="password" type="password" placeholder="Password" required class="block w-full p-2.5 bg-slate-700 rounded-lg text-white">
                    <button type="submit" class="w-full py-2.5 bg-emerald-600 text-white font-bold rounded-lg hover:bg-emerald-700">Masuk</button>
                </form>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="mainApp" class="hidden min-h-full flex flex-col md:flex-row bg-slate-50">
        <aside class="w-full md:w-64 bg-slate-900 text-slate-300 p-4">
            <h2 class="text-white font-bold mb-4 px-2">Menu Utama</h2>
            <button onclick="switchTab('manage')" class="w-full text-left p-3 hover:bg-slate-800 rounded transition"><i class="fa-solid fa-book mr-2"></i> Manajemen Buku</button>
            <button onclick="switchTab('scan')" class="w-full text-left p-3 hover:bg-slate-800 rounded transition"><i class="fa-solid fa-camera mr-2"></i> AI Cover Scan</button>
            <button onclick="switchTab('settings')" class="w-full text-left p-3 hover:bg-slate-800 rounded transition"><i class="fa-solid fa-sliders mr-2"></i> Pengaturan</button>
        </aside>
        <main class="flex-grow p-8">
            <div id="panel-manage" class="tab-panel">
                <h2 class="text-2xl font-bold mb-6 text-slate-900">Daftar Buku</h2>
                <div id="bookList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <p class="text-slate-500 italic">Memuat data dari database...</p>
                </div>
            </div>
            <div id="panel-scan" class="tab-panel hidden">
                <h2 class="text-2xl font-bold mb-4">AI Cover Scan</h2>
                <div class="bg-white p-6 rounded-lg shadow border border-slate-200">
                    <p class="mb-4">Gunakan kamera untuk memindai cover buku dan ekstrak metadata otomatis.</p>
                    <button onclick="alert('Fitur kamera aktif...')" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold">Mulai Scan</button>
                </div>
            </div>
            <div id="panel-settings" class="tab-panel hidden">
                <h2 class="text-2xl font-bold mb-6">Pengaturan Sistem</h2>
                <div class="bg-white p-6 rounded-lg shadow">
                    <label class="block text-sm font-bold mb-2">Google Apps Script URL:</label>
                    <input id="configGasUrl" type="text" placeholder="Masukkan URL Web App..." class="w-full p-2 border rounded mb-4">
                    <button onclick="saveConfig()" class="bg-emerald-600 text-white px-4 py-2 rounded font-bold">Simpan Konfigurasi</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const savedUrl = localStorage.getItem('gasUrl') || "";
        document.getElementById('configGasUrl').value = savedUrl;

        function saveConfig() { 
            localStorage.setItem('gasUrl', document.getElementById('configGasUrl').value); 
            alert("Konfigurasi berhasil disimpan!"); 
        }

        async function fetchBooks() {
            if(!savedUrl) return;
            try {
                const response = await fetch(savedUrl, { 
                    method: "POST", 
                    body: JSON.stringify({ action: "fetchBooks" }) 
                });
                const data = await response.json();
                const list = document.getElementById("bookList");
                if(data.books && data.books.length > 0) {
                    list.innerHTML = data.books.map(b => `
                        <div class="p-4 bg-white border border-slate-200 rounded-lg shadow-sm hover:shadow-md transition">
                            <h3 class="font-bold text-slate-900">${b.title}</h3>
                            <p class="text-sm text-slate-600">${b.author}</p>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = "<p>Belum ada buku dalam katalog.</p>";
                }
            } catch (err) { console.error("Gagal ambil data:", err); }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("mainApp").classList.remove("hidden");
            fetchBooks();
        });

        function switchTab(tab) {
            document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
            document.getElementById(`panel-${tab}`).classList.remove("hidden");
        }
    </script>
</body>
</html>
