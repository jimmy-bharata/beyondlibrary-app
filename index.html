<!DOCTYPE html>
<html lang="id" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyondLibrary Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>.tab-panel.hidden { display: none; }</style>
</head>
<body class="h-full text-slate-800">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="min-h-full flex flex-col justify-center py-12 bg-slate-900">
        <div class="sm:mx-auto sm:w-full sm:max-w-md text-center text-white">
            <h2 class="text-3xl font-extrabold">BeyondLibrary</h2>
            <p class="text-slate-400 mt-2 text-sm">Sistem Perpustakaan Pintar</p>
        </div>
        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-slate-800 py-8 px-6 shadow-2xl rounded-2xl border border-slate-700">
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-300">Username</label>
                        <input id="username" type="text" required class="block w-full mt-1 p-2.5 bg-slate-700 rounded-lg text-white">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-300">Password</label>
                        <input id="password" type="password" required class="block w-full mt-1 p-2.5 bg-slate-700 rounded-lg text-white">
                    </div>
                    <button type="submit" class="w-full py-2.5 rounded-lg bg-emerald-600 text-white font-bold hover:bg-emerald-700">Masuk</button>
                </form>
                <div class="mt-6 pt-6 border-t border-slate-700 text-center">
                    <button onclick="document.getElementById('configPanel').classList.toggle('hidden')" class="text-xs text-slate-400 hover:text-white underline">Atur URL Backend</button>
                    <div id="configPanel" class="hidden mt-4 text-left">
                        <input id="configGasUrl" type="text" placeholder="https://script.google.com/..." class="w-full p-2 bg-slate-700 rounded text-white text-sm border border-slate-600">
                        <button onclick="saveConfig()" class="w-full mt-2 py-1.5 bg-slate-600 text-white rounded text-xs font-bold">Simpan URL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="mainApp" class="hidden min-h-full flex flex-col md:flex-row bg-slate-50">
        <aside class="w-full md:w-64 bg-slate-900 text-slate-300 p-4">
            <h1 class="text-white font-bold mb-6 px-2 text-xl">BeyondLibrary</h1>
            <button onclick="switchTab('search')" class="w-full text-left p-3 hover:bg-slate-800 rounded"><i class="fa fa-search mr-2"></i> Pencarian</button>
            <button id="navAdminManage" onclick="switchTab('manage')" class="hidden w-full text-left p-3 hover:bg-slate-800 rounded text-amber-500"><i class="fa fa-cog mr-2"></i> Management</button>
            <button onclick="switchTab('settings')" class="w-full text-left p-3 hover:bg-slate-800 rounded"><i class="fa fa-sliders mr-2"></i> Pengaturan</button>
        </aside>
        
        <main class="flex-grow p-8">
            <div id="panel-search" class="tab-panel">
                <h2 class="text-2xl font-bold mb-4">Pencarian Buku</h2>
                <input type="text" placeholder="Cari buku berdasarkan judul/penulis..." class="w-full p-3 border rounded-lg">
            </div>

            <div id="panel-manage" class="tab-panel hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Book Management</h2>
                    <button onclick="alert('Membuka Kamera AI Cover Scan...')" class="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold">
                        <i class="fa fa-camera mr-2"></i> AI Cover Scan
                    </button>
                </div>
                <div class="bg-white p-6 rounded-xl border shadow-sm">
                    <p class="text-slate-500 text-sm">Daftar buku Anda akan muncul di sini setelah tersinkronisasi.</p>
                </div>
            </div>

            <div id="panel-settings" class="tab-panel hidden">
                <h2 class="text-xl font-bold mb-4">Pengaturan Sistem</h2>
                <div class="bg-white p-6 rounded-xl border shadow-sm mb-6">
                    <p class="text-sm text-slate-500">Versi Sistem: <span class="font-bold text-slate-900">v1.5.0</span></p>
                    <p class="text-xs text-slate-400 mt-1">Status: Stabil (Build: 2026-06-22)</p>
                </div>
                <input id="configGasUrlMain" type="text" placeholder="URL Backend..." class="w-full p-2 border rounded">
                <button onclick="saveConfigMain()" class="mt-4 bg-emerald-600 text-white px-4 py-2 rounded">Simpan URL</button>
            </div>
        </main>
    </div>

    <script>
        let savedUrl = localStorage.getItem('gasUrl') || "";
        document.getElementById('configGasUrl').value = savedUrl;
        document.getElementById('configGasUrlMain').value = savedUrl;

        function saveConfig() { localStorage.setItem('gasUrl', document.getElementById('configGasUrl').value); location.reload(); }
        function saveConfigMain() { localStorage.setItem('gasUrl', document.getElementById('configGasUrlMain').value); alert("URL tersimpan!"); }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const url = localStorage.getItem('gasUrl');

            try {
                const response = await fetch(url, { 
                    method: "POST", mode: 'cors',
                    body: JSON.stringify({ action: "login", username, password }) 
                });
                const data = await response.json();

                if (data.success) {
                    document.getElementById("loginScreen").classList.add("hidden");
                    document.getElementById("mainApp").classList.remove("hidden");
                    if (data.user?.role?.toLowerCase() === 'admin') {
                        document.getElementById("navAdminManage").classList.remove("hidden");
                    }
                } else {
                    alert("Gagal: " + (data.error || "Login gagal"));
                }
            } catch (err) {
                alert("Koneksi gagal. Cek konsol (F12) untuk detail.");
            }
        });

        function switchTab(tab) {
            document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
            document.getElementById(`panel-${tab}`).classList.remove("hidden");
        }
    </script>
</body>
</html>
